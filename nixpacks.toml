[providers]
# Force Nixpacks to only use Python and ignore Node.js
python = {}

[phases.setup]
nixPkgs = ["python311", "gcc", "sqlite"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate",
  "cd telegram_bot && pip install -r requirements.txt"
]

[start]
cmd = ". /opt/venv/bin/activate && cd telegram_bot && python bot.py"
